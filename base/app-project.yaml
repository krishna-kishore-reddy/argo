apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: us-prod
  namespace: argocd
spec:
  sourceRepos:
    - 'https://github.com/krishna-kishore-reddy/gitops.git'
    - 'https://github.com/krishna-kishore-reddy/argo.git'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  roles:
    - name: prod-us
      policies:
        - p, proj:us-prod:prod-us, applications, sync, us-prod/*, allow
        - p, proj:us-prod:prod-us, applications, *, us-prod/*, allow
      groups:
        - Everyone
